<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title data-i18n="cryptoTitle">Versleutelen / ontsleutelen</title>
    <style>
      :root { --green:#60a730; --green-dark:#4f8f27; --border:#d9d9d9; --muted:#777; --bg:#f6f7f5; }
      * { box-sizing:border-box; }
      html, body { height:100%; }
      body { font-family:system-ui,sans-serif; margin:0; padding:18px; background:var(--bg);
        color:#222; font-size:14px; display:flex; flex-direction:column; }
      h1 { font-size:17px; margin:0 0 12px; }
      label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }

      /* segmented toggle */
      .seg { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; background:#fff; }
      .seg button { flex:1; border:none; background:#fff; color:#444; font-size:13px; padding:8px 6px;
        cursor:pointer; border-radius:0; }
      .seg button:hover { background:#f0f0f0; }
      .seg button.active { background:var(--green); color:#fff; }
      .seg button.active:hover { background:var(--green-dark); }

      select, input, textarea { width:100%; padding:9px; border:1px solid var(--border);
        border-radius:6px; font-size:14px; background:#fff; font-family:inherit; }
      textarea { resize:vertical; min-height:110px; }
      textarea#input { flex:1; }

      .pw-row { display:flex; gap:8px; }
      .pw-row input { flex:1; }
      .pw-row button { flex-shrink:0; padding:9px 12px; font-size:12px; }

      button.act { padding:9px 14px; border:none; border-radius:6px; background:var(--green);
        color:#fff; font-size:14px; cursor:pointer; }
      button.act:hover { background:var(--green-dark); }
      button.secondary { background:#eaeaea; color:#333; border:none; border-radius:6px; cursor:pointer; }
      button.secondary:hover { background:#dcdcdc; }

      .actions { display:flex; gap:10px; margin-top:14px; }
      .actions > button { flex:1; padding:9px 14px; font-size:14px; }

      .hint { font-size:12px; color:var(--muted); margin:6px 0 0; }
      .status { min-height:1em; font-size:12px; margin:10px 0 0; }
      .status.error { color:#c0392b; }
      .status.ok { color:var(--green); }

      .result-wrap { margin-top:14px; }
      .result-head { display:flex; align-items:center; gap:8px; }
      .result-head label { margin:0; flex:1; }
      .result-head button { padding:5px 11px; font-size:12px; }
      textarea.result { min-height:90px; font-family:monospace; font-size:12px; color:#444;
        background:#fbfbfb; margin-top:4px; }
      .hidden { display:none; }
    </style>
  </head>
  <body>
    <h1 data-i18n="cryptoTitle">Versleutelen / ontsleutelen</h1>

    <!-- modus -->
    <div class="seg" id="mode-seg">
      <button id="mode-encrypt" type="button" data-i18n="modeEncrypt">Versleutelen</button>
      <button id="mode-decrypt" type="button" data-i18n="modeDecrypt">Ontsleutelen</button>
    </div>

    <!-- wachtwoordbron -->
    <label data-i18n="manualPwLabel">Wachtwoord</label>
    <div class="seg" id="source-seg">
      <button id="source-saved" type="button" data-i18n="sourceSaved">Opgeslagen wachtwoord</button>
      <button id="source-manual" type="button" data-i18n="sourceManual">Handmatig wachtwoord</button>
    </div>

    <!-- bron: opgeslagen -->
    <div id="panel-saved">
      <label id="select-label" data-i18n="selectEntryLabel">Kies een opgeslagen URL / wachtwoord</label>
      <select id="entry-select"></select>
      <p class="hint hidden" id="saved-hint"></p>
    </div>

    <!-- bron: handmatig -->
    <div id="panel-manual" class="hidden">
      <label data-i18n="manualPwLabel">Wachtwoord</label>
      <div class="pw-row">
        <input type="password" id="manual-pw" data-i18n-ph="manualPwPlaceholder" autocomplete="off" />
        <button id="toggle-pw" class="secondary" type="button" data-i18n="showPw">Toon</button>
      </div>
    </div>

    <!-- invoer -->
    <label id="input-label" data-i18n="inputPlainLabel">Tekst</label>
    <textarea id="input"></textarea>

    <div class="actions">
      <button id="run" class="act" data-i18n="encryptDoBtn">Versleutel &amp; kopieer</button>
      <button id="close-btn" class="secondary" data-i18n="close">Sluiten</button>
    </div>

    <p class="status" id="status"></p>

    <div class="result-wrap hidden" id="result-wrap">
      <div class="result-head">
        <label id="result-label" data-i18n="encryptResultLabel">Resultaat:</label>
        <button id="copy-btn" class="secondary" data-i18n="copy">Kopieer</button>
      </div>
      <textarea class="result" id="result" readonly></textarea>
    </div>

    <script src="i18n.js"></script>
    <script src="encrypt.js"></script>
  </body>
</html>
